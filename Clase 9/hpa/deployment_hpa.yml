apiVersion: apps/v1
kind: Deployment
metadata:
  name: mi-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mi-app
  template:
    metadata:
      labels:
        app: mi-app
    spec:
      containers:
      - name: mi-app
        image: nginx
        resources:
          requests:
            cpu: "100m"      # ← OBLIGATORIO, sin él HPA no puede calcular el porcentaje de uso.
          limits:
            cpu: "200m"